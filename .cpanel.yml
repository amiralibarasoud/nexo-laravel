---
deployment:
  tasks:
    - export DEPLOYPATH=/home/$USER/nexo-app
    - export PATH=$PATH:/usr/local/bin:/opt/cpanel/composer/bin
    - /bin/bash -c "cd $DEPLOYPATH && composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan config:clear 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan migrate --force 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan db:seed --class=SettingsSeeder --force 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan storage:link 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan config:cache 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan route:cache 2>&1 || true"
    - /bin/bash -c "cd $DEPLOYPATH && php artisan view:clear 2>&1 || true"
