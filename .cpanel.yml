---
deployment:
  tasks:
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan config:clear 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan migrate --force 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan db:seed --class=SettingsSeeder --force 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan db:seed --class=BlogSeeder --force 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan storage:link 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan config:cache 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan route:cache 2>&1 || true"
    - /bin/bash -c "cd /home/modiryat/repositories/nexo-laravel && php artisan view:clear 2>&1 || true"
